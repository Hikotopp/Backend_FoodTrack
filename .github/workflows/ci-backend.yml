name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        run: chmod +x ./mvnw && ./mvnw clean test
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: target/surefire-reports/

  backend-build:
    name: Backend Build & Security
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build JAR
        run: chmod +x ./mvnw && ./mvnw clean package -DskipTests
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: backend-tests
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.backend-tests.result }}" == "failure" ]; then
            echo "❌ Quality gate FAILED"
            exit 1
          fi
          echo "✅ Quality gate PASSED"
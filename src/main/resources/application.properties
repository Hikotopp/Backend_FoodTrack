# application-local.properties
spring.datasource.url=jdbc:mysql://localhost:3306/foodtrack?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration - Ajustado para desarrollo con Docker, permite crear/actualizar el esquema si falta
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

// Configuración de HikariCP para mejorar el rendimiento de la conexión a la base de datos
# Hikari connection pool settings 
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# JWT Configuration
jwt.secret=${JWT_SECRET:ChangeThisJwtSecretKeyBeforeProduction2026!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Application Configuration
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
app.bootstrap.admin-name=${APP_BOOTSTRAP_ADMIN_NAME:FoodTrack Admin}
app.bootstrap.admin-email=${APP_BOOTSTRAP_ADMIN_EMAIL:admin@foodtrack.local}
app.bootstrap.admin-password=${APP_BOOTSTRAP_ADMIN_PASSWORD:Admin123!}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.persist-authorization=true

//factor 11
# Logging
logging.level.org.springframework.security=INFO
logging.level.com.foodtrack=INFO
logging.level.org.hibernate.SQL=WARN

# Server
server.port=8080

# MySQL Configuration
spring.datasource.url=jdbc:mysql://mysql:3306/foodtrack?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Mexico_City&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration - Ajustado para desarrollo con Docker, permite crear/actualizar el esquema si falta
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false

# Hikari connection pool settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# JWT Configuration
jwt.secret=yourSecretKeyForJWTTokenGenerationAndValidation2025!
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.foodtrack=INFO
logging.level.org.hibernate.SQL=WARN

# Server
server.port=8080
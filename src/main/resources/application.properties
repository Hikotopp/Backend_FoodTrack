# CONFIGURACION DE BASE DE DATOS MYSQL
# URL de conexion a MySQL - base de datos foodtrack
spring.datasource.url=jdbc:mysql://localhost:3306/foodtrack?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Mexico_City&characterEncoding=UTF-8

# Credenciales de MySQL
spring.datasource.username=root
spring.datasource.password=1234

# Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURACION DE JPA/HIBERNATE
# Dialecto de MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Actualizar esquema de base de datos automaticamente
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL en consola
spring.jpa.show-sql=true

# Formatear SQL para mejor lectura
spring.jpa.properties.hibernate.format_sql=true

# CONFIGURACION DE LOGGING
# Nivel de logging para la aplicacion
logging.level.com.foodtrack.spring.springboot_application=DEBUG

# Nivel de logging para SQL
logging.level.org.hibernate.SQL=DEBUG

# Formato de los logs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# CONFIGURACION DEL SERVIDOR
# Puerto donde corre la aplicacion
server.port=8080
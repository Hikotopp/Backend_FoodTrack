# MySQL Configuration
spring.datasource.url=jdbc:mysql://mysql:3306/foodtrack?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Mexico_City&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration - IMPORTANTE: cambia a create-drop para recrear la tabla
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=yourSecretKeyForJWTTokenGenerationAndValidation2025!
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.foodtrack=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Server
server.port=8080